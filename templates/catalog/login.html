<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - CourseCompass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .split-card {
            max-width: 950px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }
        .illustration-side {
            flex: 1 1 400px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-side {
            flex: 1 1 400px;
            background: white;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .illustration-side h2 { font-weight: 700; margin-top: 20px; }
        .illustration-side p { opacity: 0.9; }
    </style>
</head>
<body>
<div class="split-card">
    <div class="illustration-side">
        <!-- Simple original SVG illustration: learning / growth theme -->
        <svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="110" cy="90" r="80" fill="rgba(255,255,255,0.12)"/>
            <rect x="55" y="95" width="110" height="60" rx="6" fill="white" opacity="0.95"/>
            <rect x="65" y="105" width="90" height="8" rx="4" fill="#7c3aed"/>
            <rect x="65" y="120" width="60" height="6" rx="3" fill="#c4b5fd"/>
            <rect x="65" y="132" width="70" height="6" rx="3" fill="#c4b5fd"/>
            <path d="M60 95 L110 65 L160 95" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="150" cy="55" r="14" fill="#facc15"/>
            <path d="M143 55 L148 60 L158 48" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="30" y="140" width="18" height="18" rx="3" fill="#a5b4fc"/>
            <rect x="172" y="130" width="16" height="16" rx="3" fill="#a5b4fc"/>
        </svg>
        <h2>🎯 CourseCompass</h2>
        <p>Find the right courses to close your skill gap and reach your career goals — one step at a time.</p>
    </div>

    <div class="form-side">
        <h3 class="mb-4">Welcome Back</h3>

        {% if error_message %}
            <div class="alert alert-danger">{{ error_message }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3 mb-0">
            New student? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
